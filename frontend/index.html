<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>光爪AI LightClaw - 开箱即用的AI浏览器机器人</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#fff;color:#111}
header{padding:24px 16px;max-width:1000px;margin:0 auto}
.nav{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:700;color:#007aff}

.subtitle{font-size:18px;color:#666;margin-bottom:32px}
.buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{padding:14px 24px;border-radius:12px;font-size:16px;font-weight:500;text-decoration:none}
.btn.primary{background:#007aff;color:white}
.btn.secondary{border:1px solid #ddd;color:#111}
.section{padding:40px 16px;max-width:1000px;margin:0 auto}
h2{font-size:24px;margin-bottom:20px;text-align:center}
.skills{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:20px}
.card{padding:20px;border:1px solid #eee;border-radius:12px}
.card h3{font-size:16px;margin-bottom:8px}
.card p{font-size:14px;color:#666}
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="logo">光爪AI LightClaw</div>
  </div>

  <div class="buttons">
    <a href="#" class="btn primary">下载 Windows</a>
    <a href="#" class="btn primary">下载 Mac</a>
    <a href="#" class="btn secondary">云端版</a>
  </div>
</section>

<section class="section">
  <h2>热门技能</h2>
  <div class="skills">
    <div class="card">
      <h3>YouTube 字幕提取</h3>
      <p>一键抓取字幕、翻译、生成文章</p>
    </div>
    <div class="card">
      <h3>Reddit 营销机器人</h3>

    </div>
    <div class="card">

    </div>
    <div class="card">

</body>
</html>
